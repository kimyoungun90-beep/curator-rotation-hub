<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>큐레이터 순환근무 신청앱</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1428a0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Curator Hub">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
body{margin:0;font-family:Arial,'Noto Sans KR',sans-serif;background:#f4f6f8;color:#222}header{background:#1428a0;color:#fff;padding:24px 16px;text-align:center;font-size:22px;font-weight:bold;position:sticky;top:0;z-index:10}.container{padding:16px;max-width:560px;margin:0 auto}.menu{display:grid;gap:12px;margin-bottom:22px}.menu button{padding:17px;border:0;border-radius:14px;background:#fff;font-size:16px;font-weight:bold;box-shadow:0 3px 10px rgba(0,0,0,.08)}.section{display:none}.section.active{display:block}h2{margin:18px 0 14px;font-size:22px}.card{background:#fff;padding:16px;border-radius:14px;margin-bottom:12px;box-shadow:0 3px 10px rgba(0,0,0,.08)}.card h3{margin:0 0 8px;font-size:18px}.card p{margin:5px 0;font-size:15px;line-height:1.45}label{display:block;margin:12px 0 6px;font-weight:bold;font-size:14px}input,select,textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:15px;box-sizing:border-box;background:#fff}textarea{min-height:90px;resize:vertical}.submit-btn{margin-top:18px;width:100%;padding:15px;border:0;border-radius:12px;background:#1428a0;color:#fff;font-size:16px;font-weight:bold}.reject-btn{margin-top:8px;width:100%;padding:15px;border:0;border-radius:12px;background:#555;color:#fff;font-size:16px;font-weight:bold}.notice{margin-top:12px;font-size:14px;color:#555}.status-wait{color:#f59e0b;font-weight:bold}.status-ok{color:#16a34a;font-weight:bold}.status-no{color:#dc2626;font-weight:bold}.check-list label{display:flex;align-items:center;gap:8px;font-weight:normal;margin:8px 0}.check-list input{width:auto}.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.call,.mini-btn{display:inline-block;padding:9px 13px;background:#1428a0;color:white;text-decoration:none;border-radius:9px;font-size:14px;font-weight:bold;border:0}.schedule-btn{background:#0f766e}.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99;padding:20px;overflow:auto}.modal{background:white;max-width:520px;margin:30px auto;padding:16px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.2)}.modal-title{display:flex;justify-content:space-between;align-items:center}.close-btn{border:0;background:#eee;border-radius:8px;padding:8px 10px;font-weight:bold}.schedule-item{border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin:8px 0;background:#fafafa}.badge{display:inline-block;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:bold;background:#eef2ff;color:#1428a0;margin-right:5px}.small-text{font-size:13px;color:#777}
</style>
</head>
<body>
<header id="appHeader">큐레이터 순환근무 신청앱</header>
<div class="container">
<div class="menu">
<button onclick="showSection('lead')">큐레이터 리드인원</button><button onclick="showSection('rotation')">순환 근무 신청</button><button onclick="showSection('leadRequest')">리드 방문 요청</button><button onclick="showSection('voc')">리드 전용 요청</button><button onclick="showSection('myStatus')">내 신청 확인</button><button onclick="showSection('admin')">관리자 페이지</button>
</div>
<div id="lead" class="section active"><h2>큐레이터 리드인원</h2><div id="leadCards"></div></div>
<div id="rotation" class="section"><h2>순환 근무 신청</h2><div class="card"><label>이름</label><input id="rotationName"><label>신청 확인 비밀번호</label><input type="password" id="rotationPw"><label>본인 점포</label><select id="rotationStore"><option value="">점포를 선택하세요</option></select><label>순환 근무 요청점</label><select id="rotationRequestStore"><option value="">요청 점포를 선택하세요</option></select><label>일자 📅</label><input type="date" id="rotationDate"><label>사유</label><textarea id="rotationReason"></textarea><button class="submit-btn" onclick="sendData('rotation')">신청하기</button><p class="notice" id="rotationResult"></p></div></div>
<div id="leadRequest" class="section"><h2>리드 방문 요청</h2><div class="card"><label>이름</label><input id="leadName"><label>신청 확인 비밀번호</label><input type="password" id="leadPw"><label>본인 점포</label><select id="leadStore"><option value="">점포를 선택하세요</option></select><label>요청 리드</label><select id="leadPerson"><option value="">요청 리드를 선택하세요</option></select><label>품목 선택 / 중복 가능</label><div class="check-list"><label><input type="checkbox" class="productCheck" value="모바일"> 모바일</label><label><input type="checkbox" class="productCheck" value="노트북"> 노트북</label><label><input type="checkbox" class="productCheck" value="탭"> 탭</label><label><input type="checkbox" class="productCheck" value="웨어러블"> 웨어러블</label><label><input type="checkbox" class="productCheck" value="그 외 기타"> 그 외 기타</label></div><label>일자 📅</label><input type="date" id="leadDate"><label>사유</label><textarea id="leadReason"></textarea><button class="submit-btn" onclick="sendData('lead')">신청하기</button><p class="notice" id="leadResult"></p></div></div>
<div id="voc" class="section"><h2>리드 전용 요청</h2><div id="vocLoginBox" class="card"><label>리드 전용 비밀번호</label><input type="password" id="vocPassword"><button class="submit-btn" onclick="checkVocPassword()">확인</button><p class="notice" id="vocLoginResult"></p></div><div id="vocContent" style="display:none"><div class="card"><h3>리드 전용 요청 작성</h3><label>본인 이름</label><select id="vocLead"><option value="">리드를 선택하세요</option></select><label>교육 대상자</label><textarea id="vocMembers"></textarea><label>품목 선택 / 중복 가능</label><div class="check-list"><label><input type="checkbox" class="vocProductCheck" value="모바일"> 모바일</label><label><input type="checkbox" class="vocProductCheck" value="노트북"> 노트북</label><label><input type="checkbox" class="vocProductCheck" value="탭"> 탭</label><label><input type="checkbox" class="vocProductCheck" value="웨어러블"> 웨어러블</label><label><input type="checkbox" class="vocProductCheck" value="그 외 기타"> 그 외 기타</label></div><label>요청 구분</label><select id="vocType"><option value="">요청 구분을 선택하세요</option><option value="본인 매장 호출">본인 매장 호출</option><option value="본인이 방문">본인이 방문</option></select><label>교육 시작일 📅</label><input type="date" id="vocStartDate"><label>교육 종료일 📅</label><input type="date" id="vocEndDate"><label>사유</label><textarea id="vocReason"></textarea><button class="submit-btn" onclick="sendVocData()">요청하기</button><p class="notice" id="vocResult"></p></div><div class="card"><h3>리드별 방문 요청 현황 조회</h3><label>리드 이름</label><select id="leadCheckName"><option value="">리드를 선택하세요</option></select><label>개인 비밀번호</label><input type="password" id="leadCheckPw"><button class="submit-btn" onclick="loadLeadPrivateData()">내 현황 조회</button><p class="notice" id="leadPrivateMsg"></p></div><div id="leadPrivateResult"></div></div></div>
<div id="myStatus" class="section"><h2>내 신청 확인</h2><div class="card"><label>이름</label><input id="myName"><label>신청 확인 비밀번호</label><input type="password" id="myPw"><button class="submit-btn" onclick="loadMyStatus()">조회하기</button><p class="notice" id="myStatusMsg"></p></div><div id="myStatusResult"></div></div>
<div id="admin" class="section"><h2>관리자 페이지</h2><div id="adminLoginBox" class="card"><label>관리자 비밀번호</label><input type="password" id="adminPassword"><button class="submit-btn" onclick="checkAdminPassword()">확인</button><p class="notice" id="adminLoginResult"></p></div><div id="adminContent" style="display:none"><div class="card"><h3>순환 근무 신청 현황</h3><div id="adminRotationList">불러오는 중...</div></div><div class="card"><h3>리드 방문 요청 현황</h3><div id="adminLeadList">불러오는 중...</div></div><div class="card"><h3>리드 전용 요청 현황</h3><div id="adminVocList">불러오는 중...</div></div></div></div>
</div>
<div id="scheduleModal" class="modal-bg"><div class="modal"><div class="modal-title"><h3 id="scheduleTitle">리드 일정</h3><button class="close-btn" onclick="closeSchedule()">닫기</button></div><button class="mini-btn schedule-btn" onclick="toggleScheduleForm()">일정 변경</button><div id="scheduleForm" class="card" style="display:none;margin-top:10px"><h3>리드 일정 등록</h3><label>리드 개인 비밀번호</label><input type="password" id="schedulePw"><label>일정 구분</label><select id="scheduleType"><option value="휴무">휴무</option><option value="교육">교육</option><option value="점포 방문">점포 방문</option><option value="기타">기타</option></select><label>일자</label><input type="date" id="scheduleDate"><label>내용</label><textarea id="scheduleMemo"></textarea><button class="submit-btn" onclick="registerLeadSchedule()">일정 등록</button><p class="notice" id="scheduleFormMsg"></p></div><div id="scheduleList" style="margin-top:12px"></div></div></div>
<script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbzkoeNF3vS9q35OB25GTqDURJyb9ghsfDhAsCMOrobQrqCwLeaSiBMCk9e1fG_Adw6QGg/exec";
const ADMIN_PASSWORD="10042";const VOC_PASSWORD="82820";
const stores=["양평","대구","대전","양재","일산","부산","울산","광명","천안","의정부","상봉","공세","송도","세종","혁신","하남","김해","고척","청라","평택"];
const leads=[{name:"강문흠",store:"혁신점",phone:"010-0000-0000"},{name:"이준호",store:"공세점",phone:"010-0000-0000"},{name:"김동규",store:"고척점",phone:"010-0000-0000"},{name:"우예빈",store:"양재점",phone:"010-0000-0000"},{name:"최명석",store:"대전점",phone:"010-0000-0000"},{name:"정성원",store:"광명점",phone:"010-0000-0000"},{name:"주혜원",store:"송도점",phone:"010-0000-0000"},{name:"김민경",store:"부산점",phone:"010-0000-0000"}];
let currentScheduleLead="";
function fillSelect(id,list){const s=document.getElementById(id);if(!s)return;list.forEach(x=>s.insertAdjacentHTML("beforeend",`<option value="${x}">${x}</option>`))}
function init(){renderLeadCards();["rotationStore","rotationRequestStore","leadStore"].forEach(id=>fillSelect(id,stores));["leadPerson","vocLead","leadCheckName"].forEach(id=>fillSelect(id,leads.map(x=>x.name)));const t=new Date().toISOString().slice(0,10);["rotationDate","leadDate","vocStartDate","vocEndDate","scheduleDate"].forEach(id=>{const e=document.getElementById(id);if(e)e.value=t})}
function renderLeadCards(){document.getElementById("leadCards").innerHTML=leads.map(l=>`<div class="card"><h3>${l.name}</h3><p>점포: ${l.store}</p><p>연락처: ${l.phone}</p><div class="btn-row"><a class="call" href="tel:${l.phone}">전화하기</a><button class="mini-btn schedule-btn" onclick="openSchedule('${l.name}')">리드 일정</button></div></div>`).join("")}
function showSection(id){document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");window.scrollTo({top:0,behavior:"smooth"})}
function getCheckedValues(c){return Array.from(document.querySelectorAll("."+c+":checked")).map(x=>x.value).join(", ")}
function postToScript(data){return fetch(WEB_APP_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(data)})}
function sendData(type){let data={},rid="";if(type==="rotation"){rid="rotationResult";data={type:"rotation",name:v("rotationName"),password:v("rotationPw"),store:v("rotationStore"),requestStore:v("rotationRequestStore"),date:v("rotationDate"),reason:v("rotationReason")};if(!data.name||!data.password||!data.store||!data.requestStore||!data.date||!data.reason)return msg(rid,"모든 항목을 입력해주세요.")}if(type==="lead"){rid="leadResult";data={type:"lead",name:v("leadName"),password:v("leadPw"),store:v("leadStore"),lead:v("leadPerson"),products:getCheckedValues("productCheck"),date:v("leadDate"),reason:v("leadReason")};if(!data.name||!data.password||!data.store||!data.lead||!data.products||!data.date||!data.reason)return msg(rid,"모든 항목을 입력해주세요.")}msg(rid,"전송 중...");postToScript(data).then(()=>{msg(rid,type==="rotation"?"순환 근무 신청 완료 👍":"리드 방문 요청 완료 👍")}).catch(()=>msg(rid,"전송 실패 ❌"))}
function checkVocPassword(){if(v("vocPassword")===VOC_PASSWORD){document.getElementById("vocLoginBox").style.display="none";document.getElementById("vocContent").style.display="block"}else msg("vocLoginResult","비밀번호가 틀렸습니다.")}
function sendVocData(){const data={type:"voc",lead:v("vocLead"),members:v("vocMembers"),products:getCheckedValues("vocProductCheck"),visitType:v("vocType"),start:v("vocStartDate"),end:v("vocEndDate"),reason:v("vocReason")};if(!data.lead||!data.members||!data.products||!data.visitType||!data.start||!data.end||!data.reason)return msg("vocResult","모든 항목을 입력해주세요.");msg("vocResult","전송 중...");postToScript(data).then(()=>msg("vocResult","리드 전용 요청 완료 👍")).catch(()=>msg("vocResult","전송 실패 ❌"))}
function loadJsonp(action,cb,params){const old=document.getElementById(cb+"Script");if(old)old.remove();let q=`?action=${encodeURIComponent(action)}&callback=${cb}&time=${Date.now()}`;if(params)Object.keys(params).forEach(k=>q+=`&${encodeURIComponent(k)}=${encodeURIComponent(params[k])}`);const s=document.createElement("script");s.id=cb+"Script";s.src=WEB_APP_URL+q;document.body.appendChild(s)}
function checkAdminPassword(){if(v("adminPassword")===ADMIN_PASSWORD){document.getElementById("adminLoginBox").style.display="none";document.getElementById("adminContent").style.display="block";loadAdminData()}else msg("adminLoginResult","비밀번호가 틀렸습니다.")}
function loadAdminData(){loadJsonp("admin","handleAdminData",{})}
function handleAdminData(d){renderAdminList("adminRotationList",(d.rotation||[]).filter(isPendingItem));renderAdminList("adminLeadList",(d.lead||[]).filter(isPendingItem));renderAdminList("adminVocList",(d.voc||[]).filter(isPendingItem))}
function renderAdminList(id,list){const box=document.getElementById(id);if(!list.length){box.innerHTML="<p>대기 중인 신청 내역이 없습니다.</p>";return}box.innerHTML=list.slice().reverse().map(item=>{let body="";if(item.sheetName==="순환근무신청")body=`<p><b>이름:</b> ${item.name||""}</p><p><b>본인 점포:</b> ${item.store||""}</p><p><b>요청점:</b> ${item.target||""}</p><p><b>일자:</b> ${formatDateOnly(item.date)}</p><p><b>사유:</b> ${item.reason||""}</p>`;if(item.sheetName==="리드방문요청")body=`<p><b>이름:</b> ${item.name||""}</p><p><b>본인 점포:</b> ${item.store||""}</p><p><b>요청 리드:</b> ${item.target||""}</p><p><b>품목:</b> ${item.products||""}</p><p><b>일자:</b> ${formatDateOnly(item.date)}</p><p><b>사유:</b> ${item.reason||""}</p>`;if(item.sheetName==="리드전용요청")body=`<p><b>리드:</b> ${item.lead||""}</p><p><b>교육 대상자:</b> ${item.members||""}</p><p><b>품목:</b> ${item.products||""}</p><p><b>요청 구분:</b> ${item.visitType||""}</p><p><b>교육 기간:</b> ${formatDateOnly(item.start)} ~ ${formatDateOnly(item.end)}</p><p><b>사유:</b> ${item.reason||""}</p>`;const p=encodeURIComponent(JSON.stringify(item));return `<div class="card">${body}<p><b>상태:</b> <span class="${statusClass(item.status)}">${displayStatus(item.status)}</span></p><button class="submit-btn" onclick="updateStatus(event,'${p}','승인')">승인</button><button class="reject-btn" onclick="updateStatus(event,'${p}','반려')">반려</button></div>`}).join("")}
function updateStatus(e,enc,status){const item=JSON.parse(decodeURIComponent(enc));const card=e.target.closest(".card");if(card)card.remove();postToScript({action:"updateStatus",sheetName:item.sheetName,row:item.row,status,target:item.target||"",date:item.date||"",reason:item.reason||"",lead:item.lead||"",start:item.start||"",end:item.end||"",members:item.members||"",products:item.products||"",visitType:item.visitType||""})}
function loadMyStatus(){const name=v("myName"),password=v("myPw");if(!name||!password)return msg("myStatusMsg","이름과 비밀번호를 입력해주세요.");msg("myStatusMsg","조회 중...");loadJsonp("myStatus","handleMyStatus",{name,password})}
function handleMyStatus(d){msg("myStatusMsg","");const box=document.getElementById("myStatusResult");if(!d.success){box.innerHTML=`<div class="card"><p>${d.message}</p></div>`;return}const list=d.items||[];if(!list.length){box.innerHTML=`<div class="card"><p>조회된 신청 내역이 없습니다.</p></div>`;return}box.innerHTML=list.slice().reverse().map(item=>`<div class="card"><p><b>유형:</b> ${item.sheetName||""}</p><p><b>점포/대상:</b> ${item.target||item.store||item.lead||""}</p><p><b>일자:</b> ${formatDateOnly(item.date||item.start)}</p><p><b>사유:</b> ${item.reason||""}</p><p><b>상태:</b> <span class="${statusClass(item.status)}">${displayStatus(item.status)}</span></p></div>`).join("")}
function loadLeadPrivateData(){const lead=v("leadCheckName"),password=v("leadCheckPw");if(!lead||!password)return msg("leadPrivateMsg","리드 이름과 비밀번호를 입력해주세요.");msg("leadPrivateMsg","조회 중...");loadJsonp("leadStatus","handleLeadPrivateData",{lead,password})}
function handleLeadPrivateData(d){msg("leadPrivateMsg","");const box=document.getElementById("leadPrivateResult");if(!d.success){box.innerHTML=`<div class="card"><p>${d.message}</p></div>`;return}const lr=d.leadRequests||[],vr=d.vocRequests||[];let html=`<div class="card"><h3>내게 들어온 리드 방문 요청</h3>`;html+=lr.length?lr.slice().reverse().map(i=>`<div class="card"><p><b>신청자:</b> ${i.name||""}</p><p><b>점포:</b> ${i.store||""}</p><p><b>품목:</b> ${i.products||""}</p><p><b>일자:</b> ${formatDateOnly(i.date)}</p><p><b>사유:</b> ${i.reason||""}</p><p><b>상태:</b> <span class="${statusClass(i.status)}">${displayStatus(i.status)}</span></p></div>`).join(""):"<p>조회된 내역이 없습니다.</p>";html+=`</div><div class="card"><h3>내 리드 전용 요청</h3>`;html+=vr.length?vr.slice().reverse().map(i=>`<div class="card"><p><b>리드:</b> ${i.lead||""}</p><p><b>교육 대상자:</b> ${i.members||""}</p><p><b>교육 기간:</b> ${formatDateOnly(i.start)} ~ ${formatDateOnly(i.end)}</p><p><b>상태:</b> <span class="${statusClass(i.status)}">${displayStatus(i.status)}</span></p></div>`).join(""):"<p>조회된 내역이 없습니다.</p>";box.innerHTML=html+"</div>"}
function openSchedule(name){currentScheduleLead=name;document.getElementById("scheduleTitle").innerText=name+" 리드 일정";document.getElementById("scheduleModal").style.display="block";document.getElementById("scheduleForm").style.display="none";document.getElementById("scheduleList").innerHTML="<p>일정 불러오는 중...</p>";loadJsonp("schedule","handleSchedule",{lead:name})}
function handleSchedule(d){const list=d.list||[],box=document.getElementById("scheduleList");if(!list.length){box.innerHTML='<div class="schedule-item">등록된 일정이 없습니다.</div>';return}box.innerHTML=list.slice().reverse().map(i=>`<div class="schedule-item"><p><span class="badge">${i.type||i.kind||"일정"}</span> ${formatDateOnly(i.date||i.start)}</p><p>${i.memo||i.reason||i.content||""}</p></div>`).join("")}
function closeSchedule(){document.getElementById("scheduleModal").style.display="none"}function toggleScheduleForm(){const f=document.getElementById("scheduleForm");f.style.display=f.style.display==="none"?"block":"none"}
function registerLeadSchedule(){const password=v("schedulePw"),type=v("scheduleType"),date=v("scheduleDate"),memo=v("scheduleMemo");if(!currentScheduleLead||!password||!type||!date||!memo)return msg("scheduleFormMsg","모든 항목을 입력해주세요.");msg("scheduleFormMsg","등록 중...");postToScript({action:"addSchedule",lead:currentScheduleLead,password,type,date,memo}).then(()=>{msg("scheduleFormMsg","일정 등록 완료 👍");setTimeout(()=>openSchedule(currentScheduleLead),600)}).catch(()=>msg("scheduleFormMsg","등록 실패 ❌"))}
function v(id){return document.getElementById(id).value.trim()}function msg(id,t){document.getElementById(id).innerText=t}function formatDateOnly(value){if(!value)return"";if(typeof value==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(value))return value;const d=new Date(value);if(isNaN(d.getTime()))return value;return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function statusClass(s){if(s==="승인")return"status-ok";if(s==="반려")return"status-no";return"status-wait"}function displayStatus(s){return s||"대기"}function isFinalStatus(v){return v==="승인"||v==="반려"}function isPendingItem(i){return!isFinalStatus(i.status)}
if("serviceWorker"in navigator){navigator.serviceWorker.register("./service-worker.js")}init();
</script>
